<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Mode To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <button id="clear">Clear Data</button>
      <h1>To-Do List</h1>
      <div class="input-container">
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new task..."
          autofocus
        />
        <button id="add-task-btn">Add Task</button>
      </div>
      <div class="filter-container">
        <button class="filter-btn all active" data-filter="all">All</button>
        <button class="filter-btn pending" data-filter="pending">Pending</button>
        <button class="filter-btn completed" data-filter="completed">Completed</button>
      </div>
        <ul id="todo-list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
